openapi: "3.1.0"
info:
  title: Bes Ops API
  description: Uptime monitoring API
  version: "1.0.0"
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: api-keys
    description: API key management
  - name: auth
    description: Authentication and user management
  - name: badges
    description: Status badges (SVG)
  - name: events
    description: Server-Sent Events for real-time updates
  - name: heartbeats
    description: Heartbeat data and history
  - name: incidents
    description: Status page incidents
  - name: maintenance
    description: Maintenance window management
  - name: monitors
    description: Monitor CRUD and control
  - name: notifications
    description: Notification provider management
  - name: proxy
    description: Proxy configuration
  - name: settings
    description: Application settings
  - name: status-pages
    description: Public status pages
  - name: system
    description: System operations
  - name: tags
    description: Tag management
paths:
  # ─── Auth ───────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      x-ogen-operation-group: Auth
      security: []
      summary: Authenticate with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      x-ogen-operation-group: Auth
      summary: Invalidate current session
      responses:
        "204":
          description: Logged out
        "default":
          $ref: "#/components/responses/DefaultError"
  /auth/token/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      x-ogen-operation-group: Auth
      summary: Refresh JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: New token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  /auth/setup:
    get:
      operationId: needSetup
      tags: [auth]
      x-ogen-operation-group: Auth
      security: []
      summary: Check if initial setup is required
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                type: object
                required: [needSetup]
                properties:
                  needSetup:
                    type: boolean
        "default":
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: setup
      tags: [auth]
      x-ogen-operation-group: Auth
      security: []
      summary: Create initial admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 64
                  pattern: "^[\\s\\S]+$"
                password:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 255
      responses:
        "201":
          description: Admin user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "409":
          description: Setup already completed
        "default":
          $ref: "#/components/responses/DefaultError"
  /auth/password:
    put:
      operationId: changePassword
      tags: [auth]
      x-ogen-operation-group: Auth
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 255
                newPassword:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 255
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  /auth/2fa:
    get:
      operationId: get2FAStatus
      tags: [auth]
      x-ogen-operation-group: Auth
      summary: Get 2FA status for current user
      responses:
        "200":
          description: 2FA status
          content:
            application/json:
              schema:
                type: object
                required: [enabled]
                properties:
                  enabled:
                    type: boolean
        "default":
          $ref: "#/components/responses/DefaultError"
  /auth/2fa/prepare:
    post:
      operationId: prepare2FA
      tags: [auth]
      x-ogen-operation-group: Auth
      summary: Generate 2FA secret and QR URI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 255
      responses:
        "200":
          description: 2FA setup info
          content:
            application/json:
              schema:
                type: object
                required: [uri]
                properties:
                  uri:
                    type: string
                    format: uri
                    maxLength: 500
        "default":
          $ref: "#/components/responses/DefaultError"
  /auth/2fa/enable:
    post:
      operationId: enable2FA
      tags: [auth]
      x-ogen-operation-group: Auth
      summary: Enable 2FA after verifying token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, token]
              properties:
                currentPassword:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 255
                token:
                  type: string
                  minLength: 6
                  maxLength: 6
                  pattern: "^[0-9]{6}$"
      responses:
        "200":
          description: 2FA enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  /auth/2fa/disable:
    post:
      operationId: disable2FA
      tags: [auth]
      x-ogen-operation-group: Auth
      summary: Disable 2FA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                  minLength: 6
                  maxLength: 255
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  # ─── Monitors ───────────────────────────────────────────────────────────
  /monitors/uptimes:
    get:
      operationId: getMonitorUptimes
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: Get 24-hour uptime percentages for all active monitors
      responses:
        "200":
          description: Uptime ratios (0.0–1.0) for each active monitor
          content:
            application/json:
              schema:
                type: array
                maxItems: 10000
                items:
                  type: object
                  required: [monitorId, uptime]
                  additionalProperties: false
                  properties:
                    monitorId:
                      type: string
                      format: uuid
                      maxLength: 36
                    uptime:
                      type: number
                      format: double
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors:
    get:
      operationId: listMonitors
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: List all monitors for the current user
      responses:
        "200":
          description: Monitor list
          content:
            application/json:
              schema:
                type: array
                maxItems: 500
                items:
                  $ref: "#/components/schemas/Monitor"
        "default":
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: createMonitor
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: Create a new monitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonitorInput"
      responses:
        "201":
          description: Monitor created
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
                    format: uuid
                    maxLength: 36
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors/{monitorId}:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
    get:
      operationId: getMonitor
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: Get a monitor by ID
      responses:
        "200":
          description: Monitor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "default":
          $ref: "#/components/responses/DefaultError"
    put:
      operationId: updateMonitor
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: Update a monitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MonitorInput"
      responses:
        "200":
          description: Monitor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "default":
          $ref: "#/components/responses/DefaultError"
    delete:
      operationId: deleteMonitor
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: Delete a monitor
      parameters:
        - name: deleteChildren
          in: query
          description: Whether to also delete child monitors in a group
          schema:
            type: boolean
            default: false
      responses:
        "204":
          description: Monitor deleted
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors/{monitorId}/pause:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
    post:
      operationId: pauseMonitor
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: Pause a monitor
      responses:
        "200":
          description: Monitor paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors/{monitorId}/resume:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
    post:
      operationId: resumeMonitor
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: Resume a paused monitor
      responses:
        "200":
          description: Monitor resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors/{monitorId}/domain:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
    get:
      operationId: checkDomain
      tags: [monitors]
      x-ogen-operation-group: Monitor
      summary: Check domain/TLD information
      responses:
        "200":
          description: Domain info
          content:
            application/json:
              schema:
                type: object
                properties:
                  domain:
                    type: string
                    format: hostname
                    maxLength: 255
                  tld:
                    type: string
                    maxLength: 63
                    pattern: "^[a-zA-Z][a-zA-Z0-9-]*$"
        "default":
          $ref: "#/components/responses/DefaultError"
  # ─── Heartbeats ─────────────────────────────────────────────────────────
  /monitors/{monitorId}/heartbeats:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
    get:
      operationId: getHeartbeats
      tags: [heartbeats]
      x-ogen-operation-group: Heartbeat
      summary: Get heartbeat history for a monitor
      description: |
        Returns heartbeat history. Use either `hours` to get all heartbeats within a time window,
        or `count` to get the N most recent heartbeats. If both are provided, `count` takes precedence.
      parameters:
        - name: hours
          in: query
          description: Number of hours of history to return
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 8760
        - name: count
          in: query
          description: Number of most recent heartbeats to return
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Heartbeat list
          content:
            application/json:
              schema:
                type: array
                maxItems: 500
                items:
                  $ref: "#/components/schemas/Heartbeat"
        "default":
          $ref: "#/components/responses/DefaultError"
    delete:
      operationId: clearHeartbeats
      tags: [heartbeats]
      x-ogen-operation-group: Heartbeat
      summary: Clear all heartbeats for a monitor
      responses:
        "204":
          description: Heartbeats cleared
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors/{monitorId}/heartbeats/chart:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
    get:
      operationId: getChartData
      tags: [heartbeats]
      x-ogen-operation-group: Heartbeat
      summary: Get aggregated chart data for a monitor
      parameters:
        - name: hours
          in: query
          description: Number of hours of chart data to return
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 8760
            default: 24
      responses:
        "200":
          description: Chart data
          content:
            application/json:
              schema:
                type: array
                maxItems: 500
                items:
                  $ref: "#/components/schemas/ChartPoint"
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors/{monitorId}/events:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
    get:
      operationId: getImportantHeartbeats
      tags: [heartbeats]
      x-ogen-operation-group: Heartbeat
      summary: Get important heartbeats (status changes)
      parameters:
        - name: offset
          in: query
          description: Number of records to skip for pagination
          schema:
            type: integer
            format: int32
            minimum: 0
            maximum: 2.147483647e+09
            default: 0
        - name: limit
          in: query
          description: Maximum number of records to return
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Important heartbeats
          content:
            application/json:
              schema:
                type: object
                required: [data, total]
                properties:
                  data:
                    type: array
                    maxItems: 100
                    items:
                      $ref: "#/components/schemas/Heartbeat"
                  total:
                    type: integer
                    format: int64
                    minimum: 0
                    maximum: 9007199254740991
        "default":
          $ref: "#/components/responses/DefaultError"
    delete:
      operationId: clearEvents
      tags: [heartbeats]
      x-ogen-operation-group: Heartbeat
      summary: Clear important heartbeats (events) for a monitor
      responses:
        "204":
          description: Events cleared
        "default":
          $ref: "#/components/responses/DefaultError"
  /events:
    get:
      operationId: listRecentEvents
      tags: [heartbeats]
      x-ogen-operation-group: Heartbeat
      summary: Get recent important heartbeats across all monitors
      parameters:
        - name: limit
          in: query
          description: Maximum number of records to return
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Recent events across all monitors
          content:
            application/json:
              schema:
                type: object
                required: [data, total]
                properties:
                  data:
                    type: array
                    maxItems: 100
                    items:
                      $ref: "#/components/schemas/Heartbeat"
                  total:
                    type: integer
                    format: int64
                    minimum: 0
                    maximum: 9007199254740991
        "default":
          $ref: "#/components/responses/DefaultError"
  # ─── Notifications ──────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      x-ogen-operation-group: Notification
      summary: List all notification providers
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                type: array
                maxItems: 100
                items:
                  $ref: "#/components/schemas/Notification"
        "default":
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: createNotification
      tags: [notifications]
      x-ogen-operation-group: Notification
      summary: Create a notification provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
                    format: uuid
                    maxLength: 36
        "default":
          $ref: "#/components/responses/DefaultError"
  /notifications/{notificationId}:
    parameters:
      - name: notificationId
        in: path
        required: true
        description: Unique identifier of the notification provider
        schema:
          type: string
          format: uuid
          maxLength: 36
    put:
      operationId: updateNotification
      tags: [notifications]
      x-ogen-operation-group: Notification
      summary: Update a notification provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
      responses:
        "200":
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
        "default":
          $ref: "#/components/responses/DefaultError"
    delete:
      operationId: deleteNotification
      tags: [notifications]
      x-ogen-operation-group: Notification
      summary: Delete a notification provider
      responses:
        "204":
          description: Notification deleted
        "default":
          $ref: "#/components/responses/DefaultError"
  /notifications/{notificationId}/test:
    parameters:
      - name: notificationId
        in: path
        required: true
        description: Unique identifier of the notification provider
        schema:
          type: string
          format: uuid
          maxLength: 36
    post:
      operationId: testNotification
      tags: [notifications]
      x-ogen-operation-group: Notification
      summary: Send a test notification
      responses:
        "200":
          description: Test sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  # ─── Tags ───────────────────────────────────────────────────────────────
  /tags:
    get:
      operationId: listTags
      tags: [tags]
      x-ogen-operation-group: Tag
      summary: List all tags
      responses:
        "200":
          description: Tag list
          content:
            application/json:
              schema:
                type: array
                maxItems: 100
                items:
                  $ref: "#/components/schemas/Tag"
        "default":
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: createTag
      tags: [tags]
      x-ogen-operation-group: Tag
      summary: Create a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "201":
          description: Tag created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "default":
          $ref: "#/components/responses/DefaultError"
  /tags/{tagId}:
    parameters:
      - name: tagId
        in: path
        required: true
        description: Unique identifier of the tag
        schema:
          type: string
          format: uuid
          maxLength: 36
    put:
      operationId: updateTag
      tags: [tags]
      x-ogen-operation-group: Tag
      summary: Update a tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagInput"
      responses:
        "200":
          description: Tag updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "default":
          $ref: "#/components/responses/DefaultError"
    delete:
      operationId: deleteTag
      tags: [tags]
      x-ogen-operation-group: Tag
      summary: Delete a tag
      responses:
        "204":
          description: Tag deleted
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors/{monitorId}/tags:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
    post:
      operationId: addMonitorTag
      tags: [tags]
      x-ogen-operation-group: Tag
      summary: Add a tag to a monitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagId]
              properties:
                tagId:
                  type: string
                  format: uuid
                  maxLength: 36
                value:
                  type: string
                  maxLength: 255
                  pattern: "^[\\s\\S]*$"
      responses:
        "201":
          description: Tag added
        "default":
          $ref: "#/components/responses/DefaultError"
  /monitors/{monitorId}/tags/{tagId}:
    parameters:
      - $ref: '#/components/parameters/MonitorId'
      - name: tagId
        in: path
        required: true
        description: Unique identifier of the tag
        schema:
          type: string
          format: uuid
          maxLength: 36
    put:
      operationId: updateMonitorTag
      tags: [tags]
      x-ogen-operation-group: Tag
      summary: Update a monitor tag value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: string
                  maxLength: 255
                  pattern: "^[\\s\\S]*$"
      responses:
        "200":
          description: Tag updated
        "default":
          $ref: "#/components/responses/DefaultError"
    delete:
      operationId: deleteMonitorTag
      tags: [tags]
      x-ogen-operation-group: Tag
      summary: Remove a tag from a monitor
      responses:
        "204":
          description: Tag removed
        "default":
          $ref: "#/components/responses/DefaultError"
  # ─── Maintenance ────────────────────────────────────────────────────────
  /maintenance:
    get:
      operationId: listMaintenance
      tags: [maintenance]
      x-ogen-operation-group: Maintenance
      summary: List all maintenance windows
      responses:
        "200":
          description: Maintenance list
          content:
            application/json:
              schema:
                type: array
                maxItems: 100
                items:
                  $ref: "#/components/schemas/Maintenance"
        "default":
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: createMaintenance
      tags: [maintenance]
      x-ogen-operation-group: Maintenance
      summary: Create a maintenance window
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceInput"
      responses:
        "201":
          description: Maintenance created
          content:
            application/json:
              schema:
                type: object
                required: [id]
                properties:
                  id:
                    type: string
                    format: uuid
                    maxLength: 36
        "default":
          $ref: "#/components/responses/DefaultError"
  /maintenance/{maintenanceId}:
    parameters:
      - name: maintenanceId
        in: path
        required: true
        description: Unique identifier of the maintenance window
        schema:
          type: string
          format: uuid
          maxLength: 36
    get:
      operationId: getMaintenance
      tags: [maintenance]
      x-ogen-operation-group: Maintenance
      summary: Get a maintenance window
      responses:
        "200":
          description: Maintenance details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Maintenance"
        "default":
          $ref: "#/components/responses/DefaultError"
    put:
      operationId: updateMaintenance
      tags: [maintenance]
      x-ogen-operation-group: Maintenance
      summary: Update a maintenance window
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceInput"
      responses:
        "200":
          description: Maintenance updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Maintenance"
        "default":
          $ref: "#/components/responses/DefaultError"
    delete:
      operationId: deleteMaintenance
      tags: [maintenance]
      x-ogen-operation-group: Maintenance
      summary: Delete a maintenance window
      responses:
        "204":
          description: Maintenance deleted
        "default":
          $ref: "#/components/responses/DefaultError"
  /maintenance/{maintenanceId}/pause:
    parameters:
      - name: maintenanceId
        in: path
        required: true
        description: Unique identifier of the maintenance window
        schema:
          type: string
          format: uuid
          maxLength: 36
    post:
      operationId: pauseMaintenance
      tags: [maintenance]
      x-ogen-operation-group: Maintenance
