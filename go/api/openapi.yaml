                properties:
                  size:
                    type: integer
                    format: int64
                    minimum: 0
                    maximum: 9007199254740991
                    description: Size in bytes
        "default":
          $ref: "#/components/responses/DefaultError"
  /database/shrink:
    post:
      operationId: shrinkDatabase
      tags: [system]
      x-ogen-operation-group: System
      summary: Shrink database (vacuum)
      responses:
        "200":
          description: Database shrunk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "default":
          $ref: "#/components/responses/DefaultError"
  /statistics:
    delete:
      operationId: clearStatistics
      tags: [system]
      x-ogen-operation-group: System
      summary: Clear all statistics data
      responses:
        "204":
          description: Statistics cleared
        "default":
          $ref: "#/components/responses/DefaultError"
# ─── Components ─────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT bearer token for authenticating API requests. Conforms to RFC8725.
  parameters:
    MonitorId:
      name: monitorId
      in: path
      required: true
      description: Unique identifier of the monitor.
      schema:
        type: string
        format: uuid
        maxLength: 36
    BadgeStyle:
      name: style
      in: query
      description: Visual style of the rendered SVG badge.
      schema:
        type: string
        enum: [flat, flat-square, for-the-badge, plastic, social]
        default: flat
  responses:
    DefaultError:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    SVGBadge:
      description: SVG badge image
      content:
        image/svg+xml:
          schema:
            type: string
            maxLength: 10000
            pattern: "^<svg[\\s\\S]*<\\/svg>$"
  schemas:
    ErrorResponse:
      description: Standard error response returned for all 4xx and 5xx responses.
      type: object
      required: [code, error]
      properties:
        code:
          type: string
          description: Machine-readable error code following gRPC status conventions (e.g. NOT_FOUND, INVALID_ARGUMENT, INTERNAL).
          enum:
            - OK
            - CANCELED
            - UNKNOWN
            - INVALID_ARGUMENT
            - DEADLINE_EXCEEDED
            - NOT_FOUND
            - ALREADY_EXISTS
            - PERMISSION_DENIED
            - RESOURCE_EXHAUSTED
            - FAILED_PRECONDITION
            - ABORTED
            - OUT_OF_RANGE
            - UNIMPLEMENTED
            - INTERNAL
            - UNAVAILABLE
            - DATA_LOSS
            - UNAUTHENTICATED
        error:
          type: string
          maxLength: 500
          pattern: "^[\\s\\S]*$"
          description: Human-readable error message describing what went wrong.
    MessageResponse:
      description: Standard success response with a human-readable message.
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 500
          pattern: "^[\\s\\S]*$"
          description: Human-readable success message.
    LoginRequest:
      description: Credentials for authenticating a user session.
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[\\s\\S]+$"
          description: The account username.
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 255
          description: The account password.
        token:
          type: string
          minLength: 6
          maxLength: 6
          pattern: "^[0-9]{6}$"
          description: 2FA TOTP token. Required if the account has two-factor authentication enabled.
    LoginResponse:
      description: Response after a successful login attempt.
      type: object
      required: [token]
      properties:
        token:
          type: string
          maxLength: 2048
          pattern: "^[A-Za-z0-9_.-]+$"
          description: JWT bearer token for authenticating subsequent requests. Signed with ECDSA (ES256).
        refreshToken:
          type: string
          maxLength: 2048
          pattern: "^[A-Za-z0-9_.-]+$"
          description: Opaque refresh token for obtaining new access tokens without re-authenticating.
        tokenRequired:
          type: boolean
          description: If true, the account has 2FA enabled and a TOTP token must be provided to complete login.
    RefreshTokenRequest:
      description: Request body for refreshing an access token.
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          maxLength: 2048
          pattern: "^[A-Za-z0-9_.-]+$"
          description: The refresh token issued during login.
    TokenResponse:
      description: Response containing a fresh JWT token.
      type: object
      required: [token]
      properties:
        token:
          type: string
          maxLength: 2048
          pattern: "^[A-Za-z0-9_.-]+$"
          description: Newly issued JWT bearer token.
    Monitor:
      description: A monitor represents a single endpoint or service being monitored for uptime.
      type: object
      required: [id, name, type, active]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
        name:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]+$"
        type:
          type: string
          maxLength: 30
          enum:
            - http
            - port
            - ping
            - keyword
            - json-query
            - grpc-keyword
            - dns
            - steam
            - gamedig
            - mqtt
            - sqlserver
            - postgres
            - mysql
            - mongodb
            - radius
            - redis
            - group
            - snmp
            - rabbitmq
            - tailscale-ping
            - real-browser
            - manual
        active:
          type: boolean
        interval:
          type: integer
          format: int32
          minimum: 20
          maximum: 86400
          default: 60
        timeout:
          type: integer
          format: int32
          minimum: 1
          maximum: 600
          default: 48
        maxRetries:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          default: 0
        retryInterval:
          type: integer
          format: int32
          minimum: 5
          maximum: 86400
          default: 60
        description:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
        upsideDown:
          type: boolean
        tags:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/MonitorTag"
        notificationIds:
          type: array
          maxItems: 50
          items:
            type: string
            format: uuid
            maxLength: 36
        resendInterval:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000
          default: 0
        expiryNotification:
          type: boolean
        config:
          $ref: "#/components/schemas/MonitorConfig"
    MonitorInput:
      description: Input for creating or updating a monitor.
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]*$"
        type:
          type: string
          maxLength: 30
          pattern: "^[\\s\\S]*$"
        active:
          type: boolean
          default: true
        interval:
          type: integer
          format: int32
          minimum: 20
          maximum: 86400
          default: 60
        timeout:
          type: integer
          format: int32
          minimum: 1
          maximum: 600
          default: 48
        maxRetries:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          default: 0
        retryInterval:
          type: integer
          format: int32
          minimum: 5
          maximum: 86400
          default: 60
        description:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
        upsideDown:
          type: boolean
        notificationIds:
          type: array
          maxItems: 50
          items:
            type: string
            format: uuid
            maxLength: 36
        resendInterval:
          type: integer
          format: int32
          minimum: 0
          maximum: 1000
          default: 0
        expiryNotification:
          type: boolean
        config:
          $ref: "#/components/schemas/MonitorConfig"
    MonitorConfig:
      description: Type-specific configuration for a monitor, discriminated by the kind field.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          maxLength: 30
          pattern: "^[\\s\\S]*$"
          description: Discriminator field identifying the monitor configuration type.
      oneOf:
        - $ref: "#/components/schemas/HttpMonitorConfig"
        - $ref: "#/components/schemas/PortMonitorConfig"
        - $ref: "#/components/schemas/PingMonitorConfig"
        - $ref: "#/components/schemas/DnsMonitorConfig"
        - $ref: "#/components/schemas/GrpcMonitorConfig"
        - $ref: "#/components/schemas/MqttMonitorConfig"
        - $ref: "#/components/schemas/RedisMonitorConfig"
        - $ref: "#/components/schemas/SmtpMonitorConfig"
        - $ref: "#/components/schemas/TailscalePingMonitorConfig"
        - $ref: "#/components/schemas/GroupMonitorConfig"
      discriminator:
        propertyName: kind
        mapping:
          http: "#/components/schemas/HttpMonitorConfig"
          port: "#/components/schemas/PortMonitorConfig"
          ping: "#/components/schemas/PingMonitorConfig"
          dns: "#/components/schemas/DnsMonitorConfig"
          grpc-keyword: "#/components/schemas/GrpcMonitorConfig"
          mqtt: "#/components/schemas/MqttMonitorConfig"
          redis: "#/components/schemas/RedisMonitorConfig"
          smtp: "#/components/schemas/SmtpMonitorConfig"
          tailscale-ping: "#/components/schemas/TailscalePingMonitorConfig"
          group: "#/components/schemas/GroupMonitorConfig"
    HttpMonitorConfig:
      description: Configuration for HTTP/HTTPS monitor checks including keyword and JSON path matching.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [http]
        url:
          type: string
          format: uri
          maxLength: 2048
        method:
          type: string
          enum: [GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS]
          default: GET
        headers:
          type: array
          maxItems: 50
          items:
            type: object
            required: [name, value]
            properties:
              name:
                type: string
                maxLength: 255
                pattern: "^[A-Za-z0-9_-]+$"
              value:
                type: string
                maxLength: 2000
                pattern: "^[\\s\\S]*$"
        body:
          type: string
          maxLength: 10000
          pattern: "^[\\s\\S]*$"
        basicAuthUser:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
        basicAuthPass:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
        maxRedirects:
          type: integer
          format: int32
          minimum: 0
          maximum: 50
          default: 10
        acceptedStatusCodes:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 20
            pattern: "^[0-9]{3}(-[0-9]{3})?$"
        ignoreTls:
          type: boolean
        keyword:
          type: string
          maxLength: 500
          pattern: "^[\\s\\S]*$"
        invertKeyword:
          type: boolean
        jsonPath:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
        expectedValue:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
        proxyId:
          type: string
          format: uuid
          maxLength: 36
    PortMonitorConfig:
      description: Configuration for TCP port connectivity checks.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [port]
        hostname:
          type: string
          format: hostname
          maxLength: 255
        port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
        ignoreTls:
          type: boolean
    PingMonitorConfig:
      description: Configuration for ICMP ping checks.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [ping]
        hostname:
          type: string
          format: hostname
          maxLength: 255
        packetSize:
          type: integer
          format: int32
          minimum: 1
          maximum: 65500
          default: 56
    DnsMonitorConfig:
      description: Configuration for DNS resolution checks.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [dns]
        hostname:
          type: string
          format: hostname
          maxLength: 255
        port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
        dnsResolveType:
          type: string
          enum: [A, AAAA, CAA, CNAME, MX, NS, PTR, SOA, SRV, TXT]
        dnsResolveServer:
          type: string
          format: hostname
          maxLength: 255
    GrpcMonitorConfig:
      description: Configuration for gRPC health checks with keyword matching.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [grpc-keyword]
        grpcUrl:
          type: string
          format: uri
          maxLength: 2048
        grpcServiceName:
          type: string
          maxLength: 255
          pattern: "^[A-Za-z0-9_./-]*$"
        grpcMethod:
          type: string
          maxLength: 255
          pattern: "^[A-Za-z0-9_./-]*$"
        grpcEnableTls:
          type: boolean
        ignoreTls:
          type: boolean
    MqttMonitorConfig:
      description: Configuration for MQTT broker connectivity and message checks.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [mqtt]
        hostname:
          type: string
          format: hostname
          maxLength: 255
        port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
        mqttTopic:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]+$"
        mqttSuccessMessage:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
        mqttUsername:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
        mqttPassword:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
        ignoreTls:
          type: boolean
    RedisMonitorConfig:
      description: Configuration for Redis connectivity checks.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [redis]
        hostname:
          type: string
          format: hostname
          maxLength: 255
        port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
        databaseQuery:
          type: string
          maxLength: 2000
          pattern: "^[\\s\\S]*$"
    SmtpMonitorConfig:
      description: Configuration for SMTP server connectivity checks.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [smtp]
        hostname:
          type: string
          format: hostname
          maxLength: 255
        port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
        ignoreTls:
          type: boolean
    TailscalePingMonitorConfig:
      description: Configuration for Tailscale DERP ping checks.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [tailscale-ping]
        hostname:
          type: string
          format: hostname
          maxLength: 255
    GroupMonitorConfig:
      description: Configuration for a group monitor that aggregates the status of member monitors.
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [group]
        tagIds:
          type: array
          maxItems: 50
          items:
            type: string
            format: uuid
            maxLength: 36
          description: Tag IDs used to select member monitors. Any monitor with any of these tags is a group member.
    Heartbeat:
      description: A single check result recording the status and response time of a monitor at a point in time.
      type: object
      required: [id, monitorId, status, time]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier for this heartbeat.
        monitorId:
          type: string
          format: uuid
          maxLength: 36
          description: The monitor that produced this heartbeat.
        status:
          type: string
          enum: [down, up, pending, maintenance, degraded]
          description: "Monitor status at this point in time."
        time:
          type: string
          format: date-time
          maxLength: 25
          description: UTC timestamp when this check was performed.
        msg:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
          description: Human-readable status message (e.g., error details when DOWN, or response info when UP).
        latency:
          type: integer
          format: int64
          minimum: 0
          maximum: 9007199254740991
          description: Response time in milliseconds. Null if the check did not complete.
        important:
          type: boolean
          description: True if this heartbeat represents a status change (e.g., UP→DOWN transition).
        duration:
          type: integer
          format: int64
          minimum: 0
          maximum: 9007199254740991
          description: Duration in seconds that the monitor has been in the current status.
    ChartPoint:
      description: Aggregated monitoring data for a single time interval, used for rendering charts.
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          minimum: 0
          maximum: 9007199254740991
          description: Unix timestamp (seconds) for the start of this interval.
        up:
          type: integer
          format: int32
          minimum: 0
          maximum: 2.147483647e+09
          description: Number of successful checks in this interval.
        down:
          type: integer
          format: int32
          minimum: 0
          maximum: 2.147483647e+09
          description: Number of failed checks in this interval.
        latency:
          type: number
          minimum: 0
          description: Average response time in milliseconds for this interval.
        latencyMin:
          type: integer
          format: int32
          minimum: 0
          maximum: 2.147483647e+09
          description: Minimum response time in milliseconds for this interval.
        latencyMax:
          type: integer
          format: int32
          minimum: 0
          maximum: 2.147483647e+09
          description: Maximum response time in milliseconds for this interval.
    Notification:
      description: A configured notification provider that can receive alerts when monitors change status.
      type: object
      required: [id, name, type, active]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier for this notification provider.
        name:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]*$"
          description: Human-readable name for this notification configuration.
        type:
          type: string
          minLength: 1
          maxLength: 50
          pattern: "^[\\s\\S]*$"
          description: Provider type identifier (e.g., 'slack', 'telegram', 'smtp', 'webhook').
        active:
          type: boolean
          description: Whether this notification provider is active and will receive alerts.
        config:
          description: Provider-specific configuration (e.g., webhook URL, API token, channel). Shape depends on the provider type.
    NotificationInput:
      description: Input for creating or updating a notification provider configuration.
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]*$"
          description: Human-readable name for this notification configuration.
        type:
          type: string
          minLength: 1
          maxLength: 50
          pattern: "^[\\s\\S]*$"
          description: Provider type identifier (e.g., 'slack', 'telegram', 'smtp', 'webhook').
        active:
          type: boolean
          default: true
          description: Whether this notification provider should be active immediately.
        config:
          description: Provider-specific configuration. Required fields depend on the provider type.
        applyExisting:
          type: boolean
          default: false
          description: If true, automatically link this notification to all existing monitors.
    Tag:
      description: A label that can be attached to monitors for categorization and filtering.
      type: object
      required: [id, name, color]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier for this tag.
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[\\s\\S]*$"
          description: Display name of the tag.
        color:
          type: string
          minLength: 4
          maxLength: 9
          pattern: "^#[0-9a-fA-F]{3,8}$"
          description: Hex color code for the tag (e.g., '#ff0000').
    TagInput:
      description: Input for creating or updating a tag.
      type: object
      required: [name, color]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[\\s\\S]*$"
          description: Display name of the tag.
        color:
          type: string
          minLength: 4
          maxLength: 9
          pattern: "^#[0-9a-fA-F]{3,8}$"
          description: Hex color code for the tag (e.g., '#ff0000').
    MonitorTag:
      description: A tag assignment on a monitor, optionally with a per-monitor value.
      type: object
      properties:
        tagId:
          type: string
          format: uuid
          maxLength: 36
          description: The tag's unique identifier.
        name:
          type: string
          maxLength: 100
          pattern: "^[\\s\\S]*$"
          description: Display name of the tag.
        color:
          type: string
          maxLength: 9
          pattern: "^#[0-9a-fA-F]{3,8}$"
          description: Hex color code of the tag.
        value:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
          description: Optional per-monitor value for this tag (e.g., environment name, region).
    Maintenance:
      description: A scheduled maintenance window during which monitors are expected to be offline. Notifications are suppressed and uptime is not affected during maintenance.
      type: object
      required: [id, title, active, strategy]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier for this maintenance window.
        title:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]*$"
          description: Human-readable title for this maintenance window.
        description:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
          description: Optional detailed description of the maintenance activity.
        active:
          type: boolean
          description: Whether this maintenance window is currently active.
        strategy:
          type: string
          enum: [manual, single, recurring-interval, recurring-weekday, recurring-day-of-month, cron]
          description: "Scheduling strategy: 'manual' (manually triggered), 'single' (one-time window), or recurring patterns."
        startDate:
          type: string
          format: date-time
          maxLength: 25
          description: Start date/time for single or recurring maintenance windows.
        endDate:
          type: string
          format: date-time
          maxLength: 25
          description: End date/time for single maintenance windows or the recurrence end date.
        startTime:
          type: string
          maxLength: 5
          pattern: "^[0-9]{2}:[0-9]{2}$"
          description: "Daily start time in HH:MM format for recurring maintenance."
        endTime:
          type: string
          maxLength: 5
          pattern: "^[0-9]{2}:[0-9]{2}$"
          description: "Daily end time in HH:MM format for recurring maintenance."
        weekdays:
          type: array
          maxItems: 7
          items:
            type: integer
            format: int32
            minimum: 0
            maximum: 6
          description: "Days of the week (0=Sunday, 6=Saturday) for recurring-weekday strategy."
        daysOfMonth:
          type: array
          maxItems: 31
          items:
            type: integer
            format: int32
            minimum: 1
            maximum: 31
          description: Days of the month (1-31) for recurring-day-of-month strategy.
        intervalDay:
          type: integer
          format: int32
          minimum: 1
          maximum: 365
          description: Interval in days between recurrences for recurring-interval strategy.
        cron:
          type: string
          maxLength: 100
          pattern: "^[0-9*,/\\- ]+$"
          description: Cron expression for cron-based scheduling strategy.
        durationMinutes:
          type: integer
          format: int32
          minimum: 1
          maximum: 525600
          description: Duration of each maintenance window in minutes.
        timezoneOption:
          type: string
          maxLength: 64
          pattern: "^[A-Za-z_/+-]+$"
          description: IANA timezone identifier for scheduling (e.g., 'America/New_York').
    MaintenanceInput:
      description: Input for creating or updating a maintenance window.
      type: object
      required: [title, strategy]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]*$"
          description: Human-readable title for this maintenance window.
        description:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
          description: Optional detailed description of the maintenance activity.
        active:
          type: boolean
          default: true
          description: Whether the maintenance window should be active immediately.
        strategy:
          type: string
          enum: [manual, single, recurring-interval, recurring-weekday, recurring-day-of-month, cron]
          description: "Scheduling strategy for this maintenance window."
        startDate:
          type: string
          format: date-time
          maxLength: 25
          description: Start date/time for the maintenance window.
        endDate:
          type: string
          format: date-time
          maxLength: 25
          description: End date/time for single maintenance windows.
        startTime:
          type: string
          maxLength: 5
          pattern: "^[0-9]{2}:[0-9]{2}$"
          description: "Daily start time in HH:MM format for recurring maintenance."
        endTime:
          type: string
          maxLength: 5
          pattern: "^[0-9]{2}:[0-9]{2}$"
          description: "Daily end time in HH:MM format for recurring maintenance."
        weekdays:
          type: array
          maxItems: 7
          items:
            type: integer
            format: int32
            minimum: 0
            maximum: 6
          description: "Days of the week (0=Sunday, 6=Saturday) for recurring-weekday strategy."
        daysOfMonth:
          type: array
          maxItems: 31
          items:
            type: integer
            format: int32
            minimum: 1
            maximum: 31
          description: Days of the month (1-31) for recurring-day-of-month strategy.
        intervalDay:
          type: integer
          format: int32
          minimum: 1
          maximum: 365
          description: Interval in days between recurrences.
        cron:
          type: string
          maxLength: 100
          pattern: "^[0-9*,/\\- ]+$"
          description: Cron expression for cron-based scheduling.
        durationMinutes:
          type: integer
          format: int32
          minimum: 1
          maximum: 525600
          description: Duration of each maintenance window in minutes.
        timezoneOption:
          type: string
          maxLength: 64
          pattern: "^[A-Za-z_/+-]+$"
          description: IANA timezone identifier for scheduling (e.g., 'America/New_York').
    StatusPage:
      description: A public-facing status page that displays the health of one or more monitors. Accessible without authentication.
      type: object
      required: [slug, title]
      properties:
        slug:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
          description: URL-safe identifier used in the status page URL (e.g., /status/{slug}).
        title:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]*$"
          description: Page title displayed at the top of the status page.
        description:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
          description: Optional description shown below the title.
        icon:
          type: string
          maxLength: 100000
          pattern: "^[\\s\\S]*$"
          description: URL or data URI for the status page favicon/icon.
        theme:
          type: string
          enum: [auto, light, dark]
          description: Color theme for the status page.
        published:
          type: boolean
          description: Whether the status page is publicly accessible.
        showTags:
          type: boolean
          description: Whether to display monitor tags on the status page.
        showPoweredBy:
          type: boolean
          description: Whether to show the 'Powered by' attribution footer.
        showCertificateExpiry:
          type: boolean
          description: Whether to display TLS certificate expiry dates for monitors.
        customCss:
          type: string
          maxLength: 10000
          pattern: "^[\\s\\S]*$"
          description: Custom CSS to inject into the status page for branding.
        footerText:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
          description: Custom footer text (supports HTML).
        googleAnalyticsId:
          type: string
          maxLength: 30
          pattern: "^(G-[A-Z0-9]+|UA-[0-9]+-[0-9]+)?$"
          description: Google Analytics tracking ID (e.g., 'G-XXXXXXXXXX').
        groups:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/StatusPageGroup"
          description: Ordered list of monitor groups displayed on the status page.
    StatusPageInput:
      description: Input for creating or updating a status page.
      type: object
      required: [title, slug]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]*$"
          description: Page title displayed at the top of the status page.
        slug:
          type: string
          minLength: 1
          maxLength: 128
          pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
          description: URL-safe identifier. Must be unique across all status pages.
        description:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
          description: Optional description shown below the title.
        icon:
          type: string
          maxLength: 100000
          pattern: "^[\\s\\S]*$"
          description: URL or data URI for the status page favicon/icon.
        theme:
          type: string
          enum: [auto, light, dark]
          description: Color theme for the status page.
        published:
          type: boolean
          default: true
          description: Whether the status page should be publicly accessible.
        showTags:
          type: boolean
          default: false
          description: Whether to display monitor tags on the status page.
        showPoweredBy:
          type: boolean
          default: true
          description: Whether to show the 'Powered by' attribution footer.
        showCertificateExpiry:
          type: boolean
          default: false
          description: Whether to display TLS certificate expiry dates.
        customCss:
          type: string
          maxLength: 10000
          pattern: "^[\\s\\S]*$"
          description: Custom CSS to inject into the status page.
        footerText:
          type: string
          maxLength: 1000
          pattern: "^[\\s\\S]*$"
          description: Custom footer text (supports HTML).
        googleAnalyticsId:
          type: string
          maxLength: 30
          pattern: "^(G-[A-Z0-9]+|UA-[0-9]+-[0-9]+)?$"
          description: Google Analytics tracking ID.
        groups:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/StatusPageGroup"
          description: Ordered list of monitor groups to display.
    StatusPageGroup:
      description: A named group of monitors displayed together on a status page.
      type: object
      required: [name]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier for this group (assigned by server on creation).
        name:
          type: string
          minLength: 1
          maxLength: 150
          pattern: "^[\\s\\S]*$"
          description: Display name of the group.
        weight:
          type: integer
          format: int32
          minimum: 0
          maximum: 10000
          description: Sort order weight (lower values appear first).
        monitorIds:
          type: array
          maxItems: 200
          items:
            type: string
            format: uuid
            maxLength: 36
          description: IDs of monitors to include in this group.
        tagIds:
          type: array
          maxItems: 50
          items:
            type: string
            format: uuid
            maxLength: 36
          description: Tag IDs used to dynamically include monitors. Unioned with monitorIds.
    Incident:
      description: An incident posted to a status page to communicate service disruptions or planned changes to users.
      type: object
      required: [id, title, content, style]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier for this incident.
        title:
          type: string
          minLength: 1
          maxLength: 200
          pattern: "^[\\s\\S]*$"
          description: Short title summarizing the incident.
        content:
          type: string
          maxLength: 10000
          pattern: "^[\\s\\S]*$"
          description: Detailed description of the incident (supports Markdown).
        style:
          type: string
          enum: [info, warning, danger, primary, light, dark]
          description: Visual severity style for the incident banner.
        pin:
          type: boolean
          description: If true, the incident is pinned at the top of the status page.
        createdDate:
          type: string
          format: date-time
          maxLength: 25
          description: When the incident was first created.
        lastUpdatedDate:
          type: string
          format: date-time
          maxLength: 25
          description: When the incident was last updated.
        resolved:
          type: boolean
          description: Whether the incident has been marked as resolved.
    IncidentInput:
      description: Input for creating or updating an incident on a status page.
      type: object
      required: [title, content, style]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          pattern: "^[\\s\\S]*$"
          description: Short title summarizing the incident.
        content:
          type: string
          minLength: 1
          maxLength: 10000
          pattern: "^[\\s\\S]*$"
          description: Detailed description of the incident (supports Markdown).
        style:
          type: string
          enum: [info, warning, danger, primary, light, dark]
          description: Visual severity style for the incident banner.
        pin:
          type: boolean
          default: true
          description: Whether to pin this incident at the top of the status page.
    Settings:
      description: Application-wide configuration settings. All fields are optional on update (PATCH semantics).
      type: object
      properties:
        primaryBaseURL:
          type: string
          format: uri
          maxLength: 2048
          description: The public-facing base URL of this instance (used in notifications and badges).
        serverTimezone:
          type: string
          maxLength: 64
          pattern: "^[A-Za-z_/+-]+$"
          description: IANA timezone identifier for server-side time display (e.g., 'America/New_York').
        entryPage:
          type: string
          enum: [dashboard, statusPage]
          description: Default page shown when users navigate to the root URL.
        trustProxy:
          type: boolean
          description: If true, trust X-Forwarded-For headers from reverse proxies for client IP detection.
        disableAuth:
          type: boolean
          description: If true, disable all authentication (use only in trusted networks).
        apiKeysEnabled:
          type: boolean
          description: Whether API key authentication is enabled for programmatic access.
        keepDataPeriodDays:
          type: integer
          format: int32
          minimum: 1
          maximum: 3650
          description: Number of days to retain heartbeat data before automatic cleanup.
        statusPageSlug:
          type: string
          maxLength: 128
          pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
          description: Slug of the default status page shown when entryPage is 'statusPage'.
    APIKey:
      description: An API key for programmatic access to the API. The key value itself is only returned once at creation time.
      type: object
      required: [id, name, active]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier for this API key.
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[\\s\\S]*$"
          description: Human-readable label for identifying this key's purpose.
        active:
          type: boolean
          description: Whether this API key is currently enabled and can authenticate requests.
        expires:
          type: string
          format: date-time
          maxLength: 25
          description: Expiration date/time after which the key is no longer valid. Null means no expiry.
        createdDate:
          type: string
          format: date-time
          maxLength: 25
          description: When this API key was created.
    APIKeyInput:
      description: Input for creating a new API key.
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: "^[\\s\\S]*$"
          description: Human-readable label for identifying this key's purpose.
        expires:
          type: string
          format: date-time
          maxLength: 25
          description: Optional expiration date/time. If omitted, the key never expires.
    Proxy:
      description: An HTTP or SOCKS proxy used by monitors for outbound connections to their targets.
      type: object
      required: [id, protocol, host, port, active]
      properties:
        id:
          type: string
          format: uuid
          maxLength: 36
          description: Unique identifier for this proxy.
        protocol:
          type: string
          enum: [http, https, socks, socks5, socks5h, socks4]
          description: Proxy protocol type.
        host:
          type: string
          format: hostname
          minLength: 1
          maxLength: 255
          description: Proxy server hostname or IP address.
        port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
          description: Proxy server port number.
        active:
          type: boolean
          description: Whether this proxy is currently available for use.
        default:
          type: boolean
          description: If true, this proxy is used by default for all monitors that don't specify a proxy.
        auth:
          type: boolean
          description: Whether this proxy requires authentication.
        username:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
          description: Proxy authentication username (only used if auth is true).
        password:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
          description: Proxy authentication password (only used if auth is true).
        applyExisting:
          type: boolean
          description: Whether this proxy is applied to all existing monitors.
    ProxyInput:
      description: Input for adding or updating a proxy configuration.
      type: object
      required: [protocol, host, port]
      properties:
        protocol:
          type: string
          enum: [http, https, socks, socks5, socks5h, socks4]
          description: Proxy protocol type.
        host:
          type: string
          format: hostname
          minLength: 1
          maxLength: 255
          description: Proxy server hostname or IP address.
        port:
          type: integer
          format: int32
          minimum: 1
          maximum: 65535
          description: Proxy server port number.
        active:
          type: boolean
          default: true
          description: Whether this proxy should be available for use immediately.
        default:
          type: boolean
          default: false
          description: If true, use this proxy by default for all new monitors.
        auth:
          type: boolean
          default: false
          description: Whether this proxy requires authentication credentials.
        username:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
          description: Proxy authentication username.
        password:
          type: string
          maxLength: 255
          pattern: "^[\\s\\S]*$"
          description: Proxy authentication password.
        applyExisting:
          type: boolean
          default: false
          description: If true, apply this proxy to all existing monitors that don't have one configured.
