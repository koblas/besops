sqlite:
  dsn: ./data/besops.db
  output: models
  pkgname: models
  no-tests: false
  concurrency: 5
  wipe: true
  struct-tag-casing: snake
  relation-tag: "-"
  enum:
    - name: monitor_type
      type: string
      values:
        - http
        - port
        - ping
        - grpc-keyword
        - dns
        - mqtt
        - redis
        - smtp
        - tailscale-ping
        - group
    - name: maintenance_strategy
      type: string
      values:
        - manual
        - single
        - recurring-interval
        - recurring-weekday
        - recurring-day-of-month
        - cron
